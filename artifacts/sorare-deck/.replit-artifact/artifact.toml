kind = "slides"
previewPath = "/sorare-deck/"
title = "Sorare Companion Deck"
version = "1.0.0"
id = "artifacts/sorare-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/sorare-deck/" ]
localPort = 23323

[services.development]
run = "pnpm --filter @workspace/sorare-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sorare-deck", "run", "build" ]
publicDir = "artifacts/sorare-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23323"
BASE_PATH = "/sorare-deck/"
